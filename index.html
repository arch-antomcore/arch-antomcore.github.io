  <style>
    #ac-loader{
      position:fixed;inset:0;z-index:9999;
      background:#07060499;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:1.5rem;
      transition:opacity .65s cubic-bezier(.4,0,.2,1),visibility .65s;
    }
    #ac-loader.loaded{opacity:0;visibility:hidden;pointer-events:none}
    .ac-loader-mark{width:44px;height:44px;position:relative;flex-shrink:0}
    .ac-loader-ring{
      position:absolute;inset:0;border-radius:50%;
      border:1.5px solid transparent;
      animation:acSpin 1.4s linear infinite;
    }
    .ac-loader-ring:nth-child(1){border-top-color:#54dec5;border-right-color:#54dec530}
    .ac-loader-ring:nth-child(2){
      inset:7px;border-top-color:transparent;
      border-right-color:#d8bd7880;border-bottom-color:#d8bd7840;
      animation-duration:2.2s;animation-direction:reverse;
    }
    .ac-loader-dot{
      position:absolute;top:50%;left:50%;
      width:6px;height:6px;background:#54dec5;border-radius:50%;
      transform:translate(-50%,-50%);
      box-shadow:0 0 14px #54dec5;
      animation:acPulse 1.4s ease-in-out infinite;
    }
    .ac-loader-label{
      font-family:'IBM Plex Mono',ui-monospace,monospace;
      font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
      color:#f1eadb50;
      animation:acBlink 1.6s ease-in-out infinite;
    }
    @keyframes acSpin  {to{transform:rotate(360deg)}}
    @keyframes acPulse {0%,100%{opacity:.35;transform:translate(-50%,-50%)scale(.8)}50%{opacity:1;transform:translate(-50%,-50%)scale(1.2)}}
    @keyframes acBlink {0%,100%{opacity:.25}50%{opacity:.85}}
    #root:empty{min-height:100svh;display:block}
    @media(prefers-reduced-motion:reduce){
      #ac-loader{animation:none!important;transition:none!important;opacity:0!important;visibility:hidden!important}
      .ac-loader-ring,.ac-loader-dot,.ac-loader-label{animation:none!important}
    }
  </style>

<body>
  <!-- Branded loader - removed after React first render -->
  <div id="ac-loader" role="status" aria-label="Loading AetherCore" aria-live="polite">
    <div class="ac-loader-mark" aria-hidden="true">
      <div class="ac-loader-ring"></div>
      <div class="ac-loader-ring"></div>
      <div class="ac-loader-dot"></div>
    </div>
    <span class="ac-loader-label">Initializing</span>
  </div>

  <div id="root"></div>

  <script>
  (function(){
    'use strict';

    /* 1. Dismiss loader once React first renders */
    var dismissed = false;
    function dismiss(){
      if(dismissed) return; dismissed = true;
      var l = document.getElementById('ac-loader');
      if(!l) return;
      l.classList.add('loaded');
      setTimeout(function(){l && l.parentNode && l.parentNode.removeChild(l);}, 800);
    }
    var root = document.getElementById('root');
    if(root){
      var mo = new MutationObserver(function(){
        if(root.firstElementChild){ mo.disconnect(); requestAnimationFrame(function(){requestAnimationFrame(dismiss);}); }
      });
      mo.observe(root, {childList:true});
    }
    setTimeout(dismiss, 4000); // hard fallback

    /* 2. Mouse-position vars for button ripple (used by polish.css ::after) */
    document.addEventListener('mousemove', function(e){
      var el = e.target;
      for(var i=0; i<6 && el && el!==document.body; i++, el=el.parentElement){
        if(el.classList && (el.classList.contains('btn-primary')||el.classList.contains('btn-ghost'))){
          var r = el.getBoundingClientRect();
          el.style.setProperty('--mx', ((e.clientX-r.left)/r.width*100).toFixed(1)+'%');
          el.style.setProperty('--my', ((e.clientY-r.top)/r.height*100).toFixed(1)+'%');
          break;
        }
      }
    },{passive:true});

    /* 3. iOS vh fix */
    function setVH(){ document.documentElement.style.setProperty('--svh', (window.innerHeight*0.01)+'px'); }
    setVH();
    window.addEventListener('resize', setVH, {passive:true});

    /* 4. Skip loader on reduced-motion */
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) dismiss();
  })();
  </script>
